<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ElectoGuide Bharat — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #0f0f17; color: #e2e8f0; font-family: system-ui, sans-serif;
    }
    .container { text-align: center; padding: 2rem; max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; background: linear-gradient(135deg, #ff9933, #fff, #138808); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { color: #94a3b8; font-size: 0.875rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #4f46e5; color: white; border: none; border-radius: 0.75rem; cursor: pointer; font-size: 0.875rem; text-decoration: none; }
    .btn:hover { background: #4338ca; }
    .tip { margin-top: 2rem; padding: 1rem; background: rgba(255,255,255,0.05); border-radius: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
    .tip p { margin: 0; font-size: 0.75rem; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🗳️</div>
    <h1>ElectoGuide Bharat</h1>
    <p>You appear to be offline. Don't worry — your saved voter registration checklists and basic election information are still available.</p>
    <a href="/" class="btn" onclick="window.location.reload(); return false;">Try Again</a>
    <div class="tip">
      <p>💡 <strong>Tip:</strong> Connect to the internet for AI-powered responses, live election dates, and the full interactive experience.</p>
    </div>
  </div>
</body>
</html>
